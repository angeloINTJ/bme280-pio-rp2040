paragraph=Reads temperature, pressure, and humidity from Bosch BMP280/BME280 sensors. Uses TwoWirePIO_RP2040 (WirePIO) for PIO+DMA I2C on any GPIO pins. Also supports hardware I2C (Wire) and GPIO bit-bang fallback. Auto-detects BMP280 vs BME280. v1.3.0: PIO+DMA cold-start fix, setMode oversampling fix, NACK retry, dual-core logic analyzer diagnostic, comprehensive 5-sensor test suite (0 failures).
